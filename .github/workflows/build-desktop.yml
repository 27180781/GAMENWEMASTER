# בניית ה-EXE הנייד (Windows) ופרסומו כ-Release להורדה, בכל דחיפה ל-main.
# ה-EXE זמין בקישור יציב:
#   https://github.com/27180781/GAMENWEMASTER/releases/download/desktop-latest/TriviaEngine-Portable.exe

name: Build Desktop EXE

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'fixtures/**'
      - 'electron/**'
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.ts'
      - 'electron-builder.yml'
      - '.github/workflows/build-desktop.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: desktop
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run dist:win
      - name: Publish portable EXE to a stable release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: desktop-latest
          name: Trivia Engine — מנוע אופליין (EXE נייד)
          body: |
            גרסת שולחן עבודה אופליין — קובץ EXE נייד ל-Windows, בלי התקנה.
            נבנה אוטומטית מהקומיט האחרון ב-main.
          files: release/TriviaEngine-Portable.exe
          prerelease: false
