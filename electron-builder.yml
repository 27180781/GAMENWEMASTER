# אריזת מנוע הטריוויה ל-EXE נייד (portable) ל-Windows — קובץ בודד, בלי
# התקנה, רץ בלחיצה כפולה על כל מחשב. הבנייה עצמה מתבצעת ב-CI על windows-latest.

appId: com.gamenwe.trivia-engine
productName: Trivia Engine
copyright: © GAMENWEMASTER

directories:
  output: release
  buildResources: build

# מה נכנס לתוך ה-EXE: הבנייה הסטטית + תהליכי Electron. תיקיית הריסיבר
# (בינאריים של RF317SocketForm) לא נכנסת ל-asar — היא נארזת כ-extraResources
# בלתי-דחוסה כדי שאפשר יהיה להריץ את ה-exe עצמו.
files:
  - dist/**/*
  - electron/**/*
  - '!electron/receiver/**'
  - package.json

# תוכנת הקליטה RF317SocketForm (עם ה-DLL וקובץ ה-config) נארזת לצד האפליקציה,
# ב-resources/receiver, ומופעלת אוטומטית בבחירת "שחק עם שלטים". כך הכול חבילה
# אחת בהתקנה פשוטה — קובץ EXE בודד שכולל גם את תוכנת קליטת השלטים.
extraResources:
  - from: electron/receiver
    to: receiver

win:
  target:
    # (1) נייד — קובץ בודד שרץ בלי התקנה
    - target: portable
      arch:
        - x64
    # (2) מתקין — עם קיצור דרך בשולחן העבודה ובתפריט התחל
    - target: nsis
      arch:
        - x64
  # אפשר להוסיף אייקון ב-build/icon.ico בעתיד

portable:
  # שם קובץ קבוע כדי שקישור ההורדה יישאר יציב
  artifactName: TriviaEngine-Portable.exe

nsis:
  artifactName: TriviaEngine-Setup.exe
  oneClick: false # אשף התקנה (לא התקנה שקטה)
  perMachine: false # התקנה למשתמש הנוכחי — בלי צורך בהרשאות מנהל
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Trivia Engine
  runAfterFinish: true

# בלי חתימת קוד (אין תעודה) — Windows יציג אזהרת SmartScreen בהרצה ראשונה
publish: null
